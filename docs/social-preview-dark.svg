    <text x="220" y="23" text-anchor="middle" font-size="14" fill="#c084fc" font-weight="500">ios_manifest_analyzer</text>

    <rect x="340" y="0" width="210" height="36" rx="18" fill="#1e0a2e" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
